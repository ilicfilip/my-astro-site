name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Create CF Pages project if needed
        id: cf-project
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          # Try to create the project
          curl -sf -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$REPO_NAME\",\"production_branch\":\"main\"}" 2>/dev/null || true

          # List all projects and find the one matching our repo name
          # (CF may have appended a suffix like -60m)
          PROJECTS=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" 2>/dev/null || true)
          SUBDOMAIN=$(echo "$PROJECTS" | grep -o '"subdomain":"[^"]*"' | grep "$REPO_NAME" | head -1 | cut -d'"' -f4)

          if [ -n "$SUBDOMAIN" ]; then
            echo "site_url=https://$SUBDOMAIN" >> "$GITHUB_OUTPUT"
            echo "Resolved site URL: https://$SUBDOMAIN"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ github.event.repository.name }}

      - name: Save site URL as deployment
        if: steps.cf-project.outputs.site_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ steps.cf-project.outputs.site_url }}
        run: |
          DEPLOY_ID=$(curl -sf -X POST "https://api.github.com/repos/${{ github.repository }}/deployments" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"ref\":\"main\",\"environment\":\"production\",\"auto_merge\":false,\"required_contexts\":[]}" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          if [ -n "$DEPLOY_ID" ]; then
            curl -sf -X POST "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"state\":\"success\",\"environment_url\":\"$SITE_URL\",\"environment\":\"production\"}"
          fi
